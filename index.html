<script>
function addPressAnim(el) {
    el.addEventListener('pointerdown', () => { el.classList.add('pressed'); }, { passive: true });
    const release = () => el.classList.remove('pressed');
    el.addEventListener('pointerup',     release, { passive: true });
    el.addEventListener('pointercancel', release, { passive: true });
    el.addEventListener('pointerleave',  release, { passive: true });
}

let titleClickCount = 0, titleClickTimer = null;
let toastHideTimer = null;

function showEasterToast() {
    const toast = document.getElementById("easter-toast");
    clearTimeout(toastHideTimer);
    toast.style.display = "block";
    requestAnimationFrame(() => { requestAnimationFrame(() => { toast.classList.add('toast-open'); }); });
    toastHideTimer = setTimeout(hideEasterToast, 4000);
}
function hideEasterToast() {
    const toast = document.getElementById("easter-toast");
    toast.classList.remove('toast-open');
    setTimeout(() => { toast.style.display = "none"; }, 180);
}

document.getElementById("title").addEventListener("click", () => {
    titleClickCount++;
    clearTimeout(titleClickTimer);
    if (titleClickCount >= 3) { showEasterToast(); titleClickCount = 0; return; }
    titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 1500);
});

function checkEasterEgg(ymd) {
    const t = document.getElementById("title");
    const md = ymd.substring(4);
    if (md === "1205") { t.innerText = "오늘은 이 앱 개발자 생일! 🎉"; t.style.color = "#FFCB30"; }
    else if (md === "0401") { t.innerText = "박시은쌤 사랑해요"; t.style.color = "#FFCB30"; }
    else { t.innerText = "현대청운고 급식"; t.style.color = "#1f2967"; }
}

function getTodayYMD() {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;
}
function pickerValueToYMD(v) { return v.replace(/-/g,""); }

function parseDish(raw) {
    if (!raw) return null;
    return raw.replace(/<br\/>/gi,"\n")
              .replace(/\([0-9.×*]+\)/g,"")
              .split("\n").map(l=>l.trim()).filter(l=>l.length>0).join("\n");
}
async function fetchMeal(ymd) {
    checkEasterEgg(ymd);
    meals = [null, null, null];
    setStatus("불러오는 중...");
    const mc = document.getElementById("mealContent");
    mc.classList.add("empty");
    mc.innerText = "불러오는 중...";
    const url = `/api/meal?MLSV_YMD=${ymd}`;
    try {
        const res = await fetch(url), data = await res.json();
        if (data.RESULT || !data.mealServiceDietInfo) { setStatus("급식 정보가 없습니다."); showMeal(1); return; }
        for (const row of data.mealServiceDietInfo[1].row) {
            const idx = parseInt(row.MMEAL_SC_CODE) - 1;
            if (idx >= 0 && idx <= 2) meals[idx] = parseDish(row.DDISH_NM);
        }
        setStatus("불러오기 완료 ✓");
        showMeal(1);
    } catch(e) { setStatus(`오류: ${e.message}`); }
}

function showMeal(i) {
    const mc = document.getElementById("mealContent"), labels = ["조식","중식","석식"];
    if (meals[i]) { mc.classList.remove("empty"); mc.innerText = meals[i]; }
    else { mc.classList.add("empty"); mc.innerText = `${labels[i]} 정보 없음`; }
    document.querySelectorAll(".tab-group button").forEach((b,j) => b.classList.toggle("active", j===i));
}

function onDateChange() {
    const v = document.getElementById("datePicker").value;
    if (v) fetchMeal(pickerValueToYMD(v));
}

function setStatus(m) { document.getElementById("status").innerText = m; }

const SPRITE_SRC = "data:image/png;base64,";
    const SP = {
    IDLE:   { x:848,  y:2,  w:44, h:47 },
    WALK1:  { x:936,  y:2,  w:44, h:47 },
    WALK2:  { x:980,  y:2,  w:44, h:47 },
    DUCK1:  { x:1112, y:19, w:59, h:30 },
    DUCK2:  { x:1171, y:19, w:59, h:30 },
    CRASH:  { x:1024, y:2,  w:44, h:47 },
    CS:     { x:228,  y:2,  w:17, h:35 },
    CL:     { x:332,  y:2,  w:25, h:50 },
    CLOUD:  { x:86,   y:2,  w:42, h:13 },
    GROUND: { x:2,    y:54, w:1200, h:12 },
    PTERO1: { x:134,  y:2,  w:46, h:40 },
    PTERO2: { x:180,  y:2,  w:46, h:40 },
};

const W=340, H=150, SC=0.85, GY=140;
const DW=Math.round(SP.IDLE.w*SC), DH=Math.round(SP.IDLE.h*SC);
const DDW=Math.round(SP.DUCK1.w*SC), DDH=Math.round(SP.DUCK1.h*SC);
const DX=16, FLOOR=GY-DH+4, DFLOOR=GY-DDH+4;

const CFG={
    ACCELERATION:0.001, BG_CLOUD_SPEED:1.5, SPEED:15, MAX_SPEED:40,
    GRAVITY:1.8, INITIAL_JUMP_VEL:-17, SPEED_DROP_COEF:3,
    INVERT_DISTANCE:700, FLASH_DURATION:750,
};

function rnd(a,b){return a+Math.random()*(b-a);}

const spriteImg=new Image();
spriteImg.src=SPRITE_SRC;
let spriteReady=false;
spriteImg.onload=()=>{spriteReady=true;if(dinoGame)dinoGame._drawStatic();};

class DinoGame{
    constructor(id){
        this.cv=document.getElementById(id);
        this.ctx=this.cv.getContext('2d');
        this.ctx.scale(2,2);
        this.dino={x:DX,y:FLOOR,vy:0,jumping:false,ducking:false,crashed:false,speedDrop:false};
        this.obstacles=[];this.clouds=[];this.groundOff=0;this.score=0;this.hiScore=0;
        this.tick=0;this.legFrame=0;this.rafId=null;this.started=false;
        this.running=false;this.gameOver=false;this.speed=CFG.SPEED;
        this.inverted=false;this.invertTrigger=CFG.INVERT_DISTANCE;
        this.invertTimer=0;this.invertDuration=700;
        this.flashTimer=0;this.lastMilestone=0;this.spawnCountdown=100;
        for(let i=0;i<3;i++) this.clouds.push({x:60+i*120,y:Math.round(rnd(15,45))});
        this._jump=(e)=>{e.preventDefault();this._onJump();};
        this._keyDn=(e)=>{
            if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();this._onJump();}
            if(e.code==='ArrowDown'){e.preventDefault();this._onDuck(true);}
        };
        this._keyUp=(e)=>{if(e.code==='ArrowDown')this._onDuck(false);};
        this.cv.addEventListener('click',this._jump);
        this.cv.addEventListener('touchstart',this._jump,{passive:false});
        document.addEventListener('keydown',this._keyDn);
        document.addEventListener('keyup',this._keyUp);
        this._drawStatic();
    }
    _onJump(){
        if(!this.started){this.started=true;this.running=true;this._tick();return;}
        if(this.gameOver){this._restart();return;}
        if(!this.dino.jumping&&!this.dino.ducking&&!this.dino.crashed){
            this.dino.vy=CFG.INITIAL_JUMP_VEL;this.dino.jumping=true;this.dino.speedDrop=false;
        }
    }
    _onDuck(on){
        if(!this.started||this.gameOver||this.dino.crashed)return;
        if(on){
            if(this.dino.jumping){this.dino.speedDrop=true;this.dino.vy=Math.abs(this.dino.vy);}
            else{this.dino.ducking=true;}
        }else{this.dino.ducking=false;this.dino.speedDrop=false;}
    }
    _restart(){
        if(this.rafId){cancelAnimationFrame(this.rafId);this.rafId=null;}
        this.dino.y=FLOOR;this.dino.vy=0;this.dino.jumping=false;
        this.dino.ducking=false;this.dino.crashed=false;this.dino.speedDrop=false;
        this.obstacles=[];this.score=0;this.tick=0;this.legFrame=0;
        this.groundOff=0;this.speed=CFG.SPEED;this.inverted=false;
        this.invertTimer=0;this.invertTrigger=CFG.INVERT_DISTANCE;
        this.flashTimer=0;this.lastMilestone=0;this.spawnCountdown=100;
        this.gameOver=false;this.running=true;this._tick();
    }
    stop(){
        this.running=false;
        if(this.rafId){cancelAnimationFrame(this.rafId);this.rafId=null;}
        this.cv.removeEventListener('click',this._jump);
        this.cv.removeEventListener('touchstart',this._jump);
        document.removeEventListener('keydown',this._keyDn);
        document.removeEventListener('keyup',this._keyUp);
    }
    _tick(){
        this.rafId=requestAnimationFrame(()=>{
            this.rafId=null;if(!this.running)return;
            this._update();this._draw();this._tick();
        });
    }
    _update(){
        if(this.gameOver)return;
        this.tick++;this.score++;
        this.speed=Math.min(CFG.MAX_SPEED,CFG.SPEED+this.score*CFG.ACCELERATION);
        if(!this.dino.jumping&&!this.dino.crashed) this.legFrame=Math.floor(this.tick/5)%2;
        const gravity=this.dino.speedDrop?CFG.GRAVITY*CFG.SPEED_DROP_COEF:CFG.GRAVITY;
        this.dino.vy+=gravity;
        const floorY=this.dino.ducking?DFLOOR:FLOOR;
        this.dino.y=Math.min(floorY,Math.round(this.dino.y+this.dino.vy));
        if(this.dino.y>=floorY){this.dino.y=floorY;this.dino.vy=0;this.dino.jumping=false;this.dino.speedDrop=false;}
        this.groundOff=(this.groundOff+this.speed)%SP.GROUND.w;
        for(const c of this.clouds){
            c.x-=CFG.BG_CLOUD_SPEED;
            if(c.x+SP.CLOUD.w*SC<0){c.x=W+20;c.y=Math.round(rnd(15,45));}
        }
        this.spawnCountdown--;
        if(this.spawnCountdown<=0){
            const isPtero=this.score>600&&Math.random()<0.18;
            if(isPtero){
                const ph=Math.round(SP.PTERO1.h*SC);
                const pteroYOpts=[GY-ph-2,GY-ph-28,GY-ph-58];
                const py=pteroYOpts[Math.floor(Math.random()*3)];
                this.obstacles.push({type:'ptero',x:W+10,y:py,w:Math.round(SP.PTERO1.w*SC),h:ph,frame:0,fTick:0});
            }else{
                const maxCount=this.speed>=4?3:1;
                const count=1+Math.floor(Math.random()*maxCount);
                const tiles=[];
                for(let i=0;i<count;i++) tiles.push(Math.random()<0.5?SP.CS:SP.CL);
                let ow=0,oh=0;
                for(const sp of tiles){ow+=Math.round(sp.w*SC);oh=Math.max(oh,Math.round(sp.h*SC));}
                this.obstacles.push({type:'cactus',x:W+10,y:GY-oh+4,w:ow,h:oh,tiles});
            }
            const minGap=Math.round(120*(this.speed/CFG.SPEED));
            const maxGap=Math.round(minGap*1.5);
            this.spawnCountdown=Math.round(rnd(minGap,maxGap)/this.speed*4);
        }
        const pad=3;
        for(const o of this.obstacles){
            o.x=Math.round(o.x-this.speed);
            if(o.type==='ptero'){o.fTick++;if(o.fTick%8===0)o.frame=1-o.frame;}
            const dinoW=this.dino.ducking?DDW:DW,dinoH=this.dino.ducking?DDH:DH;
            const dL=this.dino.x+pad,dR=this.dino.x+dinoW-pad;
            const dT=this.dino.y+pad,dB=this.dino.y+dinoH-pad;
            const oL=o.x+pad,oR=o.x+o.w-pad;
            const oT=o.y+pad,oB=o.y+o.h-pad;
            if(dL<oR&&dR>oL&&dT<oB&&dB>oT){
                this.dino.crashed=true;this.gameOver=true;
                if(this.score>this.hiScore)this.hiScore=this.score;
            }
        }
        this.obstacles=this.obstacles.filter(o=>o.x+o.w>0);
        if(this.score>this.invertTrigger){
            this.inverted=!this.inverted;this.invertTrigger+=CFG.INVERT_DISTANCE;this.invertTimer=this.invertDuration;
        }
        if(this.invertTimer>0)this.invertTimer--;
        else if(this.inverted&&this.invertTimer===0)this.inverted=false;
        const ms=Math.floor(this.score/5/100)*100;
        if(ms>0&&ms!==this.lastMilestone){this.lastMilestone=ms;this.flashTimer=Math.round(CFG.FLASH_DURATION/16);}
        if(this.flashTimer>0)this.flashTimer--;
    }
    _spr(sp,dx,dy,scale){
        if(!spriteReady)return;
        const s=scale??SC,dw=Math.round(sp.w*s),dh=Math.round(sp.h*s),c=this.ctx;
        c.save();c.beginPath();c.rect(dx,dy,dw,dh);c.clip();
        c.drawImage(spriteImg,sp.x,sp.y,sp.w,sp.h,dx,dy,dw,dh);c.restore();
    }
    _draw(){
        const ctx=this.ctx;
        ctx.clearRect(0,0,W,H);
        if(this.inverted){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,W,H);}
        if(!spriteReady){this._drawFallback();return;}
        for(const c of this.clouds) this._spr(SP.CLOUD,Math.round(c.x),c.y,SC*0.9);
        const go=Math.round(this.groundOff),gw=SP.GROUND.w,gdh=Math.round(SP.GROUND.h*SC);
        ctx.drawImage(spriteImg,SP.GROUND.x,SP.GROUND.y,gw,SP.GROUND.h,-go,GY,gw,gdh);
        ctx.drawImage(spriteImg,SP.GROUND.x,SP.GROUND.y,gw,SP.GROUND.h,-go+gw,GY,gw,gdh);
        if(!this.dino.crashed){
            let dsp;
            if(this.dino.jumping)dsp=SP.IDLE;
            else if(this.dino.ducking)dsp=(this.legFrame===0?SP.DUCK1:SP.DUCK2);
            else dsp=(this.legFrame===0?SP.WALK1:SP.WALK2);
            this._spr(dsp,this.dino.x,this.dino.y);
        }else{this._spr(SP.CRASH,this.dino.x,this.dino.y);}
        for(const o of this.obstacles){
            if(o.type==='ptero'){this._spr(o.frame===0?SP.PTERO1:SP.PTERO2,o.x,o.y);}
            else{let tx=o.x;for(const sp of o.tiles){const tw=Math.round(sp.w*SC),th=Math.round(sp.h*SC);this._spr(sp,tx,o.y+o.h-th);tx+=tw;}}
        }
        const scoreNum=Math.floor(this.score/5),hiScoreNum=Math.floor(this.hiScore/5);
        const flashOn=this.flashTimer>0&&Math.floor(this.flashTimer/4)%2===0;
        const ink='rgba(31,41,103,0.92)';
        ctx.font='bold 13px monospace';ctx.textAlign='right';
        if(!flashOn){
            ctx.fillStyle='rgba(31,41,103,0.45)';
            ctx.fillText(`HI ${String(hiScoreNum).padStart(5,'0')}`,W-54,15);
            ctx.fillStyle=ink;ctx.fillText(String(scoreNum).padStart(5,'0'),W-8,15);
        }else{ctx.fillStyle=ink;ctx.fillText(String(scoreNum).padStart(5,'0'),W-8,15);}
        ctx.textAlign='left';
        if(this.gameOver)this._drawGameOver();
    }
    _drawStatic(){
        const ctx=this.ctx;ctx.clearRect(0,0,W,H);
        if(spriteReady){
            const gw=SP.GROUND.w,gdh=Math.round(SP.GROUND.h*SC);
            ctx.drawImage(spriteImg,SP.GROUND.x,SP.GROUND.y,gw,SP.GROUND.h,0,GY,gw,gdh);
            this._spr(SP.IDLE,DX,FLOOR);
        }
        ctx.fillStyle='rgba(31,41,103,0.6)';
        ctx.font='12px "Pretendard", sans-serif';
        ctx.textAlign='center';
        ctx.fillText('방향키 up을 눌러 시작',W/2,H*0.74);
        ctx.textAlign='left';
    }
    _drawGameOver(){
        const ctx=this.ctx;
        const scoreNum=Math.floor(this.score/5),hiScoreNum=Math.floor(this.hiScore/5);
        const px=W/2-115,py=38,pw=230,ph=74,pr=15;
        ctx.save();
        ctx.fillStyle='rgba(31,41,103,0.08)';
        ctx.beginPath();ctx.roundRect(px,py,pw,ph,pr);ctx.fill();
        const gloss=ctx.createLinearGradient(px,py,px+pw*0.65,py+ph*0.65);
        gloss.addColorStop(0,'rgba(31,41,103,0.12)');
        gloss.addColorStop(1,'rgba(31,41,103,0.00)');
        ctx.fillStyle=gloss;
        ctx.beginPath();ctx.roundRect(px,py,pw,ph,pr);ctx.fill();
        const tg=ctx.createLinearGradient(px,0,px+pw,0);
        tg.addColorStop(0,'rgba(31,41,103,0.00)');tg.addColorStop(0.2,'rgba(31,41,103,0.35)');
        tg.addColorStop(0.8,'rgba(31,41,103,0.35)');tg.addColorStop(1,'rgba(31,41,103,0.00)');
        ctx.strokeStyle=tg;ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(px+pr,py+0.5);ctx.lineTo(px+pw-pr,py+0.5);ctx.stroke();
        const bg=ctx.createLinearGradient(px,0,px+pw,0);
        bg.addColorStop(0,'rgba(31,41,103,0.00)');bg.addColorStop(0.5,'rgba(255,255,255,0.08)');
        bg.addColorStop(1,'rgba(31,41,103,0.00)');
        ctx.strokeStyle=bg;
        ctx.beginPath();ctx.moveTo(px+pr,py+ph-0.5);ctx.lineTo(px+pw-pr,py+ph-0.5);ctx.stroke();
        const lg=ctx.createLinearGradient(0,py,0,py+ph);
        lg.addColorStop(0,'rgba(31,41,103,0.00)');lg.addColorStop(0.4,'rgba(255,255,255,0.12)');
        lg.addColorStop(1,'rgba(31,41,103,0.00)');
        ctx.strokeStyle=lg;
        ctx.beginPath();ctx.moveTo(px+0.5,py+pr);ctx.lineTo(px+0.5,py+ph-pr);ctx.stroke();
        const rg=ctx.createLinearGradient(0,py,0,py+ph);
        rg.addColorStop(0,'rgba(31,41,103,0.00)');rg.addColorStop(0.4,'rgba(255,255,255,0.06)');
        rg.addColorStop(1,'rgba(31,41,103,0.00)');
        ctx.strokeStyle=rg;
        ctx.beginPath();ctx.moveTo(px+pw-0.5,py+pr);ctx.lineTo(px+pw-0.5,py+ph-pr);ctx.stroke();
        ctx.restore();
        ctx.fillStyle='rgba(31,41,103,0.92)';
        ctx.font='bold 15px "Pretendard", monospace';ctx.textAlign='center';
        ctx.fillText('GAME OVER',W/2,60);
        ctx.font='11px "Pretendard", sans-serif';ctx.fillStyle='rgba(31,41,103,0.62)';
        ctx.fillText(`점수: ${scoreNum}   최고: ${hiScoreNum}`,W/2,78);
        ctx.fillText('방향키 up을 눌러 재시작',W/2,96);
        ctx.textAlign='left';
    }
    _drawFallback(){
        const ctx=this.ctx;
        ctx.fillStyle='rgba(83,83,83,0.4)';ctx.fillRect(0,GY,W,2);
        ctx.fillStyle=this.dino.crashed?'#c00':'#535353';
        const dw=this.dino.ducking?DDW:DW,dh=this.dino.ducking?DDH:DH;
        ctx.fillRect(this.dino.x,this.dino.y,dw,dh);
        ctx.fillStyle='#2a7a2a';
        for(const o of this.obstacles)ctx.fillRect(o.x,o.y,o.w,o.h);
        if(this.gameOver)this._drawGameOver();
    }
    runIntro(onDone){this._drawStatic();onDone&&onDone();}
}

let dinoGame=null;

function openDino(){
    document.getElementById('dino-modal').style.display='flex';
    const content = document.getElementById('modal-content');
    content.classList.remove('modal-close');
    content.classList.add('modal-open');
    if(!dinoGame){
        dinoGame=new DinoGame('dino-canvas');
        dinoGame.runIntro();
    }else{
        if(dinoGame.rafId){cancelAnimationFrame(dinoGame.rafId);dinoGame.rafId=null;}
        dinoGame.running=false;dinoGame.started=false;dinoGame.gameOver=false;
        dinoGame.dino.y=FLOOR;dinoGame.dino.vy=0;dinoGame.dino.jumping=false;
        dinoGame.dino.ducking=false;dinoGame.dino.crashed=false;
        dinoGame.obstacles=[];dinoGame.score=0;dinoGame.tick=0;
        dinoGame.groundOff=0;dinoGame.speed=CFG.SPEED;
        dinoGame.inverted=false;dinoGame.flashTimer=0;
        dinoGame.lastMilestone=0;dinoGame.spawnCountdown=100;
        dinoGame.runIntro();
    }
}

function closeDino(){
    const modal = document.getElementById('dino-modal');
    const content = document.getElementById('modal-content');
    content.classList.remove('modal-open');
    content.classList.add('modal-close');
    setTimeout(()=>{ modal.style.display='none'; content.classList.remove('modal-close'); }, 160);
    if(dinoGame){
        if(dinoGame.rafId){cancelAnimationFrame(dinoGame.rafId);dinoGame.rafId=null;}
        dinoGame.running=false;
    }
}
